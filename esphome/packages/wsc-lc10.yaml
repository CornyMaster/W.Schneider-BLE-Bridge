# =============================================================================
# W.Schneider "WSC LC10" BLE light controller — ESPHome protocol package
# Include from a device configuration via `packages:`. The including file MUST
# define these substitutions:  cabinet_mac, uuid_prefix, uuid_suffix.
# Protocol reference: docs/protocol.md
#
# Connection model: PERSISTENT (auto_connect: true). The controller allows only
# one BLE connection, so while this device is connected the vendor remote/app
# cannot reach the cabinet. On single-core boards (ESP32-C3) an on-demand model
# (auto_connect: false + manual connect) is unreliable in ESPHome, hence a held
# connection. The cabinet's own touch buttons keep working (wired to the
# controller); their changes are picked up by the periodic re-read below.
#
# State handling: nothing is written on connect. The device READS c2/c3/c6 and
# mirrors the real cabinet state into Home Assistant (publish_state does not
# trigger a write-back, so there is no feedback loop). Writes happen only on an
# actual change (switch/slider). A configurable periodic re-read catches changes
# made with the cabinet's buttons.
# =============================================================================

# --- GATT characteristic UUIDs (derived from the parent's uuid_prefix/suffix) --
substitutions:
  uuid_service:    "${uuid_prefix}c0${uuid_suffix}"
  uuid_color_temp: "${uuid_prefix}c2${uuid_suffix}"
  uuid_brightness: "${uuid_prefix}c3${uuid_suffix}"
  uuid_lamp_mask:  "${uuid_prefix}c6${uuid_suffix}"
  uuid_keepalive:  "${uuid_prefix}ce${uuid_suffix}"

# --- BLE connection to the cabinet --------------------------------------------
esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: ${cabinet_mac}
    id: cabinet_ble
    auto_connect: true
    on_connect:
      then:
        - lambda: 'id(cabinet_connected).publish_state(true);'
        # Do NOT write on connect. Wait for services to resolve, then read the
        # real state and mirror it into Home Assistant.
        - delay: 1200ms
        - lambda: |-
            id(last_read_ms) = millis();
            id(actual_brightness).update();
            id(actual_color_temp).update();
            id(actual_mask).update();
    on_disconnect:
      then:
        - lambda: 'id(cabinet_connected).publish_state(false);'

# --- Persisted target state (survives reboots) --------------------------------
globals:
  - id: target_brightness_pct
    type: float
    restore_value: yes
    initial_value: '80'
  - id: target_color_temp_k
    type: int
    restore_value: yes
    initial_value: '4000'
  - id: last_read_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

# --- Write routine (on change) ------------------------------------------------
script:
  # Push the desired state: lamp mask from both switches, then (only while at
  # least one lamp is on) color temperature and brightness for both lamps.
  # mode: restart -> if two changes arrive in quick succession (both switches,
  # or dragging a slider) the LAST state wins; with the default (single) the
  # second call would be dropped and the controller would miss the final state
  # (e.g. "both off" would only write the first bit).
  - id: apply_state
    mode: restart
    then:
      - ble_client.ble_write:
          id: cabinet_ble
          service_uuid: ${uuid_service}
          characteristic_uuid: ${uuid_lamp_mask}
          value: !lambda |-
            // bit0 = outer, bit1 = inner. byte0 = 0x01 if any lamp is on.
            uint8_t mask = (id(lamp_outer).state ? 0x01 : 0x00)
                         | (id(lamp_inner).state ? 0x02 : 0x00);
            return { (uint8_t)(mask ? 0x01 : 0x00), 0x00, mask, 0x00 };
      - if:
          condition:
            lambda: 'return id(lamp_outer).state || id(lamp_inner).state;'
          then:
            - ble_client.ble_write:
                id: cabinet_ble
                service_uuid: ${uuid_service}
                characteristic_uuid: ${uuid_color_temp}
                value: !lambda |-
                  int kelvin = id(target_color_temp_k);
                  if (kelvin < 2000) kelvin = 2000;
                  if (kelvin > 6500) kelvin = 6500;
                  return { (uint8_t)(kelvin >> 8), (uint8_t)(kelvin & 0xFF),
                           (uint8_t)(kelvin >> 8), (uint8_t)(kelvin & 0xFF) };
            - ble_client.ble_write:
                id: cabinet_ble
                service_uuid: ${uuid_service}
                characteristic_uuid: ${uuid_brightness}
                value: !lambda |-
                  int raw = (int)(id(target_brightness_pct) * 100.0f + 0.5f);
                  if (raw < 100)   raw = 100;   // never 0 while a lamp is on
                  if (raw > 10000) raw = 10000;
                  return { (uint8_t)(raw >> 8), (uint8_t)(raw & 0xFF),
                           (uint8_t)(raw >> 8), (uint8_t)(raw & 0xFF) };

# --- Entities exposed to Home Assistant ---------------------------------------
binary_sensor:
  - platform: template
    name: "Cabinet connected"
    id: cabinet_connected
    device_class: connectivity

button:
  # Force an immediate re-read of the actual state (outside the periodic cycle).
  - platform: template
    name: "Read state now"
    id: read_state_now
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return id(cabinet_connected).state;'
          then:
            - lambda: |-
                id(last_read_ms) = millis();
                id(actual_brightness).update();
                id(actual_color_temp).update();
                id(actual_mask).update();

switch:
  # Two individually switchable lamps; brightness/color act on both together.
  # restore_mode: DISABLED -> no write attempt on boot; the state comes purely
  # from reading the cabinet.
  - platform: template
    name: "Outer lamp"
    id: lamp_outer
    optimistic: true
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          if (id(target_brightness_pct) <= 0) id(target_brightness_pct) = 80;
          id(lamp_outer).publish_state(true);
      - script.execute: apply_state
    turn_off_action:
      - lambda: 'id(lamp_outer).publish_state(false);'
      - script.execute: apply_state

  - platform: template
    name: "Inner lamp"
    id: lamp_inner
    optimistic: true
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          if (id(target_brightness_pct) <= 0) id(target_brightness_pct) = 80;
          id(lamp_inner).publish_state(true);
      - script.execute: apply_state
    turn_off_action:
      - lambda: 'id(lamp_inner).publish_state(false);'
      - script.execute: apply_state

number:
  - platform: template
    name: "Brightness"
    id: brightness
    unit_of_measurement: "%"
    min_value: 1          # the vendor app minimum is 10 %
    max_value: 100
    step: 1
    mode: slider
    optimistic: true
    restore_value: true
    set_action:
      - lambda: 'id(target_brightness_pct) = x;'
      - script.execute: apply_state

  - platform: template
    name: "Color temperature"
    id: color_temp
    unit_of_measurement: "K"
    min_value: 2000
    max_value: 6500
    step: 100
    mode: slider
    optimistic: true
    restore_value: true
    set_action:
      - lambda: 'id(target_color_temp_k) = (int) x;'
      - script.execute: apply_state

  # How often the actual state is re-read (catches changes made with the
  # cabinet's own buttons). 0 = only on connect; N = additionally every N
  # seconds. Adjustable in Home Assistant, survives reboots (restore_value).
  - platform: template
    name: "BLE re-read interval"
    id: reread_interval
    entity_category: config
    unit_of_measurement: "s"
    min_value: 0
    max_value: 3600
    step: 5
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 30

# --- State read-back ----------------------------------------------------------
# These ble_client sensors read c2/c3/c6 and mirror the real cabinet state into
# Home Assistant via publish_state (which does not trigger a write). Reads are
# driven explicitly via .update() (on connect / periodic / button), so the
# update_interval is set very high to keep the auto-poll out of the way.
sensor:
  - platform: ble_client
    ble_client_id: cabinet_ble
    type: characteristic
    id: actual_brightness
    name: "Actual brightness"
    entity_category: diagnostic
    unit_of_measurement: "%"
    accuracy_decimals: 0
    service_uuid: ${uuid_service}
    characteristic_uuid: ${uuid_brightness}
    update_interval: 86400s
    lambda: |-
      if (x.size() < 2) return {};
      int raw = (x[0] << 8) | x[1];        // first uint16 (BE) = actual value
      float pct = raw / 100.0f;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      id(target_brightness_pct) = pct;
      id(brightness).publish_state(pct);
      return pct;

  - platform: ble_client
    ble_client_id: cabinet_ble
    type: characteristic
    id: actual_color_temp
    name: "Actual color temperature"
    entity_category: diagnostic
    unit_of_measurement: "K"
    accuracy_decimals: 0
    service_uuid: ${uuid_service}
    characteristic_uuid: ${uuid_color_temp}
    update_interval: 86400s
    lambda: |-
      if (x.size() < 2) return {};
      int k = (x[0] << 8) | x[1];
      if (k < 2000 || k > 6500) return {};
      id(target_color_temp_k) = k;
      id(color_temp).publish_state((float) k);
      return (float) k;

  - platform: ble_client
    ble_client_id: cabinet_ble
    type: characteristic
    id: actual_mask
    name: "Actual lamp mask"
    entity_category: diagnostic
    service_uuid: ${uuid_service}
    characteristic_uuid: ${uuid_lamp_mask}
    update_interval: 86400s
    lambda: |-
      if (x.size() < 3) return {};
      uint8_t mask = x[2];                 // MM 00 ZZ 00 -> ZZ = lamp bits
      id(lamp_outer).publish_state((mask & 0x01) != 0);
      id(lamp_inner).publish_state((mask & 0x02) != 0);
      return (float) mask;

# --- Periodic re-read + keepalive ---------------------------------------------
interval:
  # Periodic re-read (only when N > 0 and connected).
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              int n = (int) id(reread_interval).state;
              return id(cabinet_connected).state && n > 0
                     && (millis() - id(last_read_ms) >= (uint32_t)(n * 1000));
          then:
            - lambda: |-
                id(last_read_ms) = millis();
                id(actual_brightness).update();
                id(actual_color_temp).update();
                id(actual_mask).update();

  # Keepalive: the controller drops idle connections after ~18 s.
  - interval: 3s
    then:
      - if:
          condition:
            lambda: 'return id(cabinet_connected).state;'
          then:
            - ble_client.ble_write:
                id: cabinet_ble
                service_uuid: ${uuid_service}
                characteristic_uuid: ${uuid_keepalive}
                value: [0xAF, 0x01]
